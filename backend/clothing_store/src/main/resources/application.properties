spring.application.name=clothing_store

# ------------------------------
# DATABASE CONFIGURATION
# ------------------------------
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.properpities.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------
# JPA / HIBERNATE CONFIGURATION
# ------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true  

# ------------------------------
# FLYWAY MIGRATIONS
# ------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.default-schema=vertice_database
spring.flyway.schema=vertice_database
spring.flyway.baseline-on-migrate=true

# ------------------------------
# SPRING DEVTOOLS CONFIGURATION (for auto-restart during development)
# ------------------------------
spring.devtools.restart.enabled=true  
spring.devtools.livereload.enabled=true 

# ------------------------------
# JWT (Values)
# ------------------------------
api.secret.key=${JWT_SECRET_KEY}
jwt.access-token-expiration=${ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token-expiration=${REFRESH_TOKEN_EXPIRATION}

# ------------------------------
# SERVER CONFIGURATION
# ------------------------------
server.port=${SERVER_PORT}

# ------------------------------
# CLOUDINARY CONFIGURATION
# ------------------------------
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET_KEY}